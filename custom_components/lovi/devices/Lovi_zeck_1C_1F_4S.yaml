name: lovi - zeck 1 curtain 1 fan 4 switches
products:
  - id: YOUR_PRODUCT_ID_HERE

entities:
  # --- THE CEILING FAN ---
  - entity: fan
    name: Ceiling Fan
    dps:
      - id: 103
        type: boolean
        name: switch
        optional: true
      - id: 106
        type: integer
        name: speed
        optional: true
        range:
          min: 1
          max: 4

  # --- THE CURTAIN ---
  - entity: cover
    name: Curtain
    class: curtain
    dps:
      - id: 102
        type: string
        name: control
        optional: true
        mapping:
          - dps_val: "open"
            value: open
          - dps_val: "close"
            value: close
          - dps_val: "stop"
            value: stop

  # --- THE 4 RELAY SWITCHES ---
  - entity: switch
    name: Switch 1
    dps:
      - id: 1
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: Switch 2
    dps:
      - id: 2
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: Switch 3
    dps:
      - id: 3
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: Switch 4
    dps:
      - id: 4
        type: boolean
        name: switch
        optional: true

  # --- THE 4 COUNTDOWN TIMERS ---
  - entity: number
    name: Timer Switch 1
    category: config
    icon: mdi:timer-outline
    dps:
      - id: 7
        type: integer
        name: value
        optional: true
        range:
          min: 0
          max: 86400

  - entity: number
    name: Timer Switch 2
    category: config
    icon: mdi:timer-outline
    dps:
      - id: 8
        type: integer
        name: value
        optional: true
        range:
          min: 0
          max: 86400

  - entity: number
    name: Timer Switch 3
    category: config
    icon: mdi:timer-outline
    dps:
      - id: 9
        type: integer
        name: value
        optional: true
        range:
          min: 0
          max: 86400

  - entity: number
    name: Timer Switch 4
    category: config
    icon: mdi:timer-outline
    dps:
      - id: 10
        type: integer
        name: value
        optional: true
        range:
          min: 0
          max: 86400

  # --- DEVICE CONFIGURATIONS ---
  - entity: select
    name: Power On State
    category: config
    icon: mdi:power-settings
    dps:
      - id: 14
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "off"
            value: "Off"
          - dps_val: "on"
            value: "On"
          - dps_val: "memory"
            value: "Memory (Last State)"

  - entity: switch
    name: Child Lock
    category: config
    icon: mdi:lock
    dps:
      - id: 104
        type: boolean
        name: switch
        optional: true

  - entity: select
    name: Touch Sensitivity
    category: config
    icon: mdi:gesture-tap
    dps:
      - id: 101
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "Low"
            value: "Prefered"
          - dps_val: "Medium"
            value: "Balanced"
          - dps_val: "High"
            value: "Air Touch"

  - entity: select
    name: Motor Steering Direction
    category: config
    icon: mdi:rotate-3d-variant
    dps:
      - id: 109
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "forward"
            value: "Forward"
          - dps_val: "back"
            value: "Back"

  # --- DIRECT COLOR SYSTEM FOR EXPO API ---
  - entity: switch
    name: "ON"
    category: config
    dps:
      - id: 114
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: "OFF" 
    category: config
    dps:
      - id: 112
        type: boolean
        name: switch
        optional: true

  - entity: switch
    name: Change color
    category: config
    dps:
      - id: 113       
        type: boolean
        name: switch
        optional: true

  - entity: text
    name: Color Hex Payload
    category: config
    dps:
      - id: 111       
        type: string
        name: value
        optional: true

  - entity: number
    name: Backlight Brightness
    icon: mdi:brightness-percent
    category: config
    dps:
      - id: 107
        type: integer
        name: value
        unit: "%"
        optional: true
        range:
          min: 0
          max: 100
  - entity: number
    name: Backlight Brightness
    icon: mdi:brightness-percent
    category: config

    dps:
      - id: 107
        type: integer
        name: value
        unit: "%"
        optional: true
        range:
          min: 0
          max: 100

